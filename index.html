<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تخمین رتبه و میانگین وزنی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040814; --s1: #0a1122; --s2: #101931; --s3: #162445; --b0: rgba(255,255,255,.04); --b1: rgba(255,255,255,.08); --b2: rgba(255,255,255,.14);
  --v1: #0284c7; --v2: #0369a1; --v3: #0ea5e9; --v4: #38bdf8; --v5: #bae6fd;
  --ind: #2563eb; --sky: #0ea5e9; --gold: #f59e0b; --gld2: #fbbf24; --gld3: #fde68a; --grn: #059669; --grn2: #10b981; --grn3: #34d399; --red: #dc2626; --red2: #ef4444; --red3: #fca5a5;
  --t1: #f0f9ff; --t2: #94a3b8; --t3: #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Vazirmatn', sans-serif; background:var(--bg); color:var(--t1); min-height:100vh; }
.wrap { max-width:860px; margin:0 auto; padding:3rem 1.25rem; }
.hdr { text-align:center; padding-bottom:3rem; }
.hdr h1 { font-size:2.5rem; font-weight:900; margin-bottom:1rem; }
.sec { background:var(--s1); border:1px solid var(--b1); border-radius:1.5rem; padding:1.7rem; margin-bottom:1.1rem; }
.sec-ttl { font-size:.8rem; font-weight:800; color:var(--t3); margin-bottom:1.4rem; }
.ogrid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.obtn { background:var(--s2); border:1.5px solid var(--b0); border-radius:1rem; padding:1.5rem; cursor:pointer; text-align:center; transition:all .3s; }
.obtn:hover, .obtn.sel { border-color:var(--v3); background:rgba(14, 165, 233, .08); transform:translateY(-3px); }
.o-name { font-size:1.1rem; font-weight:700; color:var(--t1); }
.slist { display:flex; flex-direction:column; gap:.85rem; }
.subj { background:var(--s2); border-radius:1.1rem; padding:1.2rem; }
.shead { display:flex; justify-content:space-between; margin-bottom:1rem; }
.pctwrap { position:relative; }
input { width:100%; background:var(--s1); border:1.5px solid var(--b1); border-radius:.6rem; padding:.8rem; color:var(--t1); text-align:center; outline:none; }
.cbtn { width:100%; padding:1rem; border:none; border-radius:1rem; background:var(--v3); color:#fff; font-weight:800; cursor:pointer; margin-top:2rem; }
#result { margin-top:3rem; padding:2rem; background:var(--s1); border-radius:1.5rem; text-align:center; display:none; }
.r-num { font-size:4rem; font-weight:900; color:var(--v3); }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr"><h1>محاسبه میانگین وزنی</h1></div>
  <div id="s1" class="sec">
    <div class="sec-ttl">انتخاب گرایش</div>
    <div class="ogrid" id="og"></div>
  </div>
  <div id="s2" class="sec" style="display:none">
    <div class="sec-ttl">ورود درصدها</div>
    <div class="slist" id="sl"></div>
    <button class="cbtn" onclick="calc()">محاسبه نهایی</button>
  </div>
  <div id="result">
    <div class="r-num" id="r-val">۰</div>
    <div style="color:var(--t2)">میانگین وزنی کل</div>
  </div>
</div>

<script>
const data = [
  { name: 'روانشناسی بالینی', subjects: [{n:'متون روانشناسی', w:2}, {n:'علم‌النفس', w:1}, {n:'آمار', w:1}, {n:'مرضی', w:2}, {n:'رشد', w:2}, {n:'بالینی', w:3}, {n:'فیزیولوژیک', w:1}] },
  { name: 'روانشناسی عمومی', subjects: [{n:'متون روانشناسی', w:2}, {n:'علم‌النفس', w:1}, {n:'آمار', w:1}, {n:'مرضی', w:2}, {n:'رشد', w:2}, {n:'عمومی', w:2}, {n:'فیزیولوژیک', w:1}] }
];

let sel = null;
const $ = id => document.getElementById(id);

data.forEach((d, i) => {
  const b = document.createElement('div');
  b.className = 'obtn';
  b.innerHTML = `<div class="o-name">${d.name}</div>`;
  b.onclick = () => {
    document.querySelectorAll('.obtn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    sel = d;
    renderInputs();
  };
  $('og').appendChild(b);
});

function renderInputs() {
  $('sl').innerHTML = '';
  sel.subjects.forEach((s, i) => {
    $('sl').innerHTML += `<div class="subj"><div class="shead"><span>${s.n} (ضریب ${s.w})</span></div><input type="number" id="p${i}" placeholder="درصد"></div>`;
  });
  $('s2').style.display = 'block';
}

function calc() {
  let tw = 0, ws = 0;
  sel.subjects.forEach((s, i) => {
    let p = parseFloat($('p'+i).value) || 0;
    tw += s.w;
    ws += p * s.w;
  });
  const avg = (ws / tw).toFixed(2);
  $('r-val').innerText = avg.replace(/\d/g, x => ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'][x]);
  $('result').style.display = 'block';
}
</script>
</body>
</html>
